spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: product-service-route
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
              filters:
                - StripPrefix=1
                - AddResponseHeader=X-Platform, microservices-pro
            - id: inventory-service-route
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1
server:
  port: 8080

service:
  message: API-Gateway loaded from Github repository

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info